<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo of Mind — Collective Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ── FIXED BACKGROUND IMAGE ── */
    body {
      background: #e8560a;
      background-image: url('bg.png');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 40px 48px 32px;
      mix-blend-mode: normal;
    }

    .title {
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.1;
      text-shadow: 0 1px 12px rgba(0,0,0,0.25);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }

    .live-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.25; }
    }

    .live-text {
      font-size: 0.54rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── GRID WRAPPER ── */
    .grid-wrap {
      position: relative;
      z-index: 5;
      padding: 0;
    }

    /* ── THE GRID ── */
    /* 6 columns, 20 rows = 120 cells
       Each cell is transparent by default → shows the background.
       White border lines create the grid look.                    */
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(20, 1fr);
      width: 100%;
      /* Make the grid tall enough for 20 rows at a nice square aspect */
    }

    .cell {
      aspect-ratio: 1 / 1;
      position: relative;
      /* Transparent — background shows through */
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.55);
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    /* When empty, completely see-through */
    .cell.empty { background: transparent; }

    /* When filled, the canvas covers the cell */
    .cell.filled canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Hover: brighten border */
    .cell:hover {
      border-color: rgba(255,255,255,0.95);
      z-index: 20;
    }

    /* Meta info on hover for filled cells */
    .cell-meta {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .cell.filled:hover .cell-meta { opacity: 1; }

    .cell-author {
      font-size: 0.48rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }
    .cell-time {
      font-size: 0.42rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    /* Reveal animation when a cell fills */
    @keyframes fillIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    .cell.just-added canvas {
      animation: fillIn 0.55s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-l, .footer-r {
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>

  <header>
    <h1 class="title">Echo of Mind<br>Collective Archive</h1>
    <p class="subtitle">Human Connection Through a Subconscious State</p>
    <div class="live-bar">
      <div class="live-dot"></div>
      <span class="live-text" id="liveStatus">Waiting for dreams — localhost:3000</span>
    </div>
  </header>

  <div class="grid-wrap">
    <div class="archive-grid" id="archiveGrid"></div>
  </div>

  <footer>
    <span class="footer-l">Echo of Mind</span>
    <span class="footer-r" id="countLabel">0 / 120</span>
  </footer>

  <script>
    // ─────────────────────────────
    // BUILD GRID: 6 cols × 20 rows
    // ─────────────────────────────
    const COLS  = 6;
    const ROWS  = 20;
    const TOTAL = COLS * ROWS; // 120

    const grid  = document.getElementById('archiveGrid');
    const cells = [];

    for (let i = 0; i < TOTAL; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell empty';

      const meta = document.createElement('div');
      meta.className = 'cell-meta';
      cell.appendChild(meta);

      grid.appendChild(cell);
      cells.push(cell);
    }

    // ─────────────────────────────
    // PATTERN GENERATOR
    // Creates a psychoanalytic pattern canvas from a seed + palette
    // ─────────────────────────────
    function generatePattern(seed, palette) {
      const c   = document.createElement('canvas');
      c.width   = 400;
      c.height  = 400;
      const ctx = c.getContext('2d');
      const rng = seededRng(seed);

      const palettes = {
        blue:   ['#6ec6f5','#1a5fa8','#c8e8ff','#0a2a5a','#7ab4e8'],
        violet: ['#c87ef5','#6b20b8','#e8c4ff','#2a0a5a','#a07ad8'],
        green:  ['#7ef5c0','#1ab870','#c4ffe8','#0a3a2a','#7ad8b8'],
        warm:   ['#f5a050','#c85010','#ffd4a0','#5a1a00','#d89060'],
        pink:   ['#f5a0c8','#c04080','#ffd4e8','#5a0a2a','#d880a8'],
        red:    ['#f04040','#a00010','#ffc0c0','#400000','#d07070'],
        teal:   ['#40d8c8','#0a8878','#b0f0e8','#003830','#70c0b8'],
        gold:   ['#f0c040','#a07000','#fff0b0','#403000','#c8a050'],
      };

      const pal = palettes[palette] || palettes.blue;

      // Gradient background
      const bg = ctx.createLinearGradient(rng()*400, 0, rng()*400, 400);
      bg.addColorStop(0,   pal[0] + 'ee');
      bg.addColorStop(0.4, pal[3] + 'cc');
      bg.addColorStop(0.8, pal[1] + 'cc');
      bg.addColorStop(1,   pal[4] + 'dd');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 400, 400);

      // Blob forms
      for (let i = 0; i < 14; i++) {
        const x = rng() * 400, y = rng() * 400;
        const r = 30 + rng() * 160;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0,   pal[i % pal.length] + 'aa');
        g.addColorStop(0.5, pal[(i+1) % pal.length] + '55');
        g.addColorStop(1,   'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Wave lines
      ctx.globalAlpha = 0.2;
      for (let w = 0; w < 10; w++) {
        ctx.beginPath();
        ctx.strokeStyle = pal[w % pal.length];
        ctx.lineWidth = 0.7;
        const sy = rng() * 400;
        ctx.moveTo(0, sy);
        for (let x = 0; x <= 400; x += 4) {
          const y = sy + Math.sin(x * 0.02 + rng() * 8) * (20 + rng() * 70);
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Fine grain
      ctx.globalAlpha = 0.06;
      for (let g = 0; g < 6000; g++) {
        const gx = rng() * 400, gy = rng() * 400;
        const v = rng() > 0.5 ? 255 : 0;
        ctx.fillStyle = `rgba(${v},${v},${v},0.8)`;
        ctx.fillRect(gx, gy, 1, 1);
      }
      ctx.globalAlpha = 1;

      return c;
    }

    function seededRng(seed) {
      let s = (seed * 2654435761) >>> 0;
      return () => {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ─────────────────────────────
    // ADD DREAM TO NEXT EMPTY CELL
    // ─────────────────────────────
    let filledCount = 0;
    const palList = ['blue','violet','green','warm','pink','red','teal','gold','blue','violet','green','warm','pink','red','teal','gold','blue','violet','green','warm'];

    function addDream(data = {}) {
      if (filledCount >= TOTAL) return;

      const cell    = cells[filledCount];
      const seed    = data.seed    || (Date.now() % 999999);
      const author  = data.author  || 'Anonymous';
      const time    = data.time    || new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const palette = data.palette || palList[filledCount % palList.length];

      // Generate + insert canvas
      const patternCanvas = generatePattern(seed, palette);
      cell.insertBefore(patternCanvas, cell.firstChild);

      // Update meta
      const meta = cell.querySelector('.cell-meta');
      meta.innerHTML = `
        <span class="cell-author">${author}</span>
        <span class="cell-time">${time}</span>
      `;

      cell.classList.remove('empty');
      cell.classList.add('filled', 'just-added');
      setTimeout(() => cell.classList.remove('just-added'), 700);

      filledCount++;
      document.getElementById('countLabel').textContent = filledCount + ' / ' + TOTAL;
      document.getElementById('liveStatus').textContent =
        filledCount + (filledCount === 1 ? ' dream' : ' dreams') + ' archived — localhost:3000';
    }

    // ─────────────────────────────
    // PI IMAGE CAPTURE
    // Polls http://172.20.10.2:5000/ every 4 seconds
    // Fetches the image as a blob, converts to base64,
    // compares to last captured image to detect changes,
    // and adds to grid when a new image appears.
    // ─────────────────────────────
    const PI_URL = 'http://172.20.10.2:5000/';
    let lastImageData = null;
    let isPolling = false;

    async function captureFromPi() {
      if (isPolling) return;
      isPolling = true;
      try {
        // Fetch image with cache-busting timestamp
        const res = await fetch(PI_URL + '?t=' + Date.now(), {
          cache: 'no-store',
          mode: 'cors'
        });

        if (!res.ok) { isPolling = false; return; }

        const blob = await res.blob();

        // Only process if it's an image
        if (!blob.type.startsWith('image/')) { isPolling = false; return; }

        // Convert to base64 to compare + display
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64 = reader.result;

          // Simple change detection — compare first 200 chars of base64
          const fingerprint = base64.substring(0, 200);

          if (fingerprint !== lastImageData) {
            lastImageData = fingerprint;

            // Add real image to grid
            addRealImage(base64);

            // Update status
            document.getElementById('liveStatus').textContent =
              'New dream captured — ' + new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
          }
          isPolling = false;
        };
        reader.readAsDataURL(blob);

      } catch (e) {
        // Not on same network — show offline status
        document.getElementById('liveStatus').textContent =
          'Waiting — connect to same network as Pi';
        isPolling = false;
      }
    }

    // Add a real captured image (base64) into the next grid cell
    function addRealImage(base64) {
      if (filledCount >= TOTAL) return;

      const cell = cells[filledCount];
      const time = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

      // Create image element
      const img = document.createElement('img');
      img.src = base64;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;';

      cell.insertBefore(img, cell.firstChild);

      // Meta
      const meta = cell.querySelector('.cell-meta');
      meta.innerHTML = `
        <span class="cell-author">Dream #${filledCount + 1}</span>
        <span class="cell-time">${time}</span>
      `;

      cell.classList.remove('empty');
      cell.classList.add('filled', 'just-added');
      setTimeout(() => cell.classList.remove('just-added'), 700);

      filledCount++;
      document.getElementById('countLabel').textContent = filledCount + ' / ' + TOTAL;
    }

    // Start polling every 4 seconds
    setInterval(captureFromPi, 4000);
    // Also run immediately on load
    captureFromPi();
  </script>
</body>
</html>
