<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo of Mind — Collective Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700;1,900&family=Inter:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ── ANIMATED GIF BACKGROUND ── */
    body {
      background: #111;
      background-image: url('bg.gif');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 56px 48px 40px;
      text-align: center;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(3.5rem, 9vw, 8rem);
      letter-spacing: -0.02em;
      color: #000;
      line-height: 0.95;
      margin-bottom: 16px;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
    }

    .live-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #000;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.2; }
    }

    .live-text {
      font-size: 0.54rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
    }

    /* ── GRID ── */
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      width: 100%;
    }

    /* Each cell — transparent so gif shows through */
    .cell {
      aspect-ratio: 1 / 1;
      position: relative;
      background: transparent;
      /* Darker, thicker white border = more visible grid lines */
      border: 2px solid rgba(255, 255, 255, 0.85);
      /* Padding creates the gap between grid line and image */
      padding: 8px;
      overflow: visible;
    }

    /* Image sits inside the padding gap */
    .cell img {
      position: absolute;
      inset: 8px;
      width: calc(100% - 16px);
      height: calc(100% - 16px);
      object-fit: cover;
      display: block;
      animation: fillIn 0.55s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    @keyframes fillIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Meta on hover */
    .cell-meta {
      position: absolute;
      inset: 8px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 6px 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 5;
    }
    .cell.filled:hover .cell-meta { opacity: 1; }

    .cell-author {
      font-size: 0.48rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }
    .cell-time {
      font-size: 0.42rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-l, .footer-r {
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
    }
  </style>
</head>
<body>

  <header>
    <h1 class="title">Echo of Mind<br>Collective Archive</h1>
    <p class="subtitle">Human Connection Through a Subconscious State</p>
    <div class="live-bar">
      <div class="live-dot"></div>
      <span class="live-text" id="liveStatus">Connecting to Pi…</span>
    </div>
  </header>

  <div class="archive-grid" id="archiveGrid"></div>

  <footer>
    <span class="footer-l">Echo of Mind</span>
    <span class="footer-r" id="countLabel">0 / 120</span>
  </footer>

  <script>
    // ── BUILD GRID: 6 cols × 20 rows = 120 cells ──
    const TOTAL = 120;
    const grid  = document.getElementById('archiveGrid');
    const cells = [];

    for (let i = 0; i < TOTAL; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell empty';
      const meta = document.createElement('div');
      meta.className = 'cell-meta';
      cell.appendChild(meta);
      grid.appendChild(cell);
      cells.push(cell);
    }

    let filledCount = 0;

    // ── ADD IMAGE TO NEXT EMPTY CELL ──
    function addImageToGrid(imageUrl, filename) {
      if (filledCount >= TOTAL) return;

      const cell = cells[filledCount];
      const time = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

      const img = document.createElement('img');
      img.src = imageUrl;
      cell.insertBefore(img, cell.firstChild);

      const meta = cell.querySelector('.cell-meta');
      meta.innerHTML = `
        <span class="cell-author">Dream #${filledCount + 1}</span>
        <span class="cell-time">${time}</span>
      `;

      cell.classList.remove('empty');
      cell.classList.add('filled');

      filledCount++;
      document.getElementById('countLabel').textContent = filledCount + ' / ' + TOTAL;
      document.getElementById('liveStatus').textContent =
        filledCount + (filledCount === 1 ? ' dream' : ' dreams') + ' archived';
    }

    // ── GITHUB API POLLING ──
    const GITHUB_USER   = 'hannahpeevey254';
    const GITHUB_REPO   = 'ECHO-OF-MIND';
    const GITHUB_FOLDER = 'images';
    const POLL_INTERVAL = 10000; // every 10 seconds
    let knownImages = new Set();

    async function fetchDreamImages() {
      try {
        const url      = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}`;
        const response = await fetch(url, { cache: 'no-store' });

        if (!response.ok) {
          document.getElementById('liveStatus').textContent = 'Waiting for images folder…';
          return;
        }

        const files = await response.json();

        // Only grab generated dream images from the Pi
        const dreamImages = files.filter(f =>
          f.name.startsWith('generated_') && f.name.endsWith('.png')
        );

        // Sort oldest first so grid fills in order
        dreamImages.sort((a, b) => a.name.localeCompare(b.name));

        dreamImages.forEach(file => {
          if (!knownImages.has(file.name)) {
            knownImages.add(file.name);
            const imageUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${GITHUB_FOLDER}/${file.name}`;
            addImageToGrid(imageUrl, file.name);
          }
        });

        if (dreamImages.length === 0) {
          document.getElementById('liveStatus').textContent = 'Waiting for first dream…';
        }

      } catch (e) {
        document.getElementById('liveStatus').textContent = 'Checking for dreams…';
      }
    }

    // Load on start + poll every 10 seconds
    fetchDreamImages();
    setInterval(fetchDreamImages, POLL_INTERVAL);
  </script>
</body>
</html>
